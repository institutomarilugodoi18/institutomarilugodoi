{% extends 'base.html' %}

{% block content %}
<section class="py-5 mt-4">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <!-- Título e descrição da página -->
                <div class="text-center mb-5">
                    <h2 class="fw-bold"><span class="text-warning">Excluir</span> Voluntário</h2>
                    <p class="text-muted">Esta ação removerá permanentemente o cadastro do sistema.</p>
                </div>

                <!-- Card com ícone de alerta e mensagem de confirmação -->
                <div class="card border-0 shadow p-4 text-center">
                    <div class="card-body">
                        <div class="mb-4">
                            <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3.5rem;"></i>
                        </div>
                        
                        <h4 class="fw-bold mb-3">Você tem certeza?</h4>
                        <p class="text-muted mb-4">
                            Você está prestes a excluir o voluntário <strong>{{ voluntario.nome }}</strong>. 
                            Essa operação não pode ser desfeita.
                        </p>

                        <form method="post" class="d-flex justify-content-center gap-3">
                            {% csrf_token %}
                            <a href="{% url 'listar_voluntarios' %}" class="btn btn-outline-secondary fw-bold px-4">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-danger fw-bold px-4 shadow-sm">
                                Sim, excluir
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
