name: Django CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ vars.SSH_HOST }}
            User ${{ vars.SSH_USER }}
            Port ${{ vars.SSH_PORT }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
          EOF

          cat >> ~/.ssh/known_hosts <<'EOF'
          [ag-br1-33.hospedagemelastica.com.br]:28054 ssh-rsa 
          [ag-br1-33.hospedagemelastica.com.br]:28054 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLgrJJuLnVexFmlYSe/W0adXaS2pP5Qe+vPf/iilZbuqMHr8oSfojLnwwfGJPFvfPd5LHa5C2NV7ArY5cij+w3c=
          [ag-br1-33.hospedagemelastica.com.br]:28054 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPxuDfJqaSZ5uVBJg9FuGVuN1bTE8vZH8zCSLS16k7MR
          EOF

      - name: Deploy para o servidor
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude 'media' \
            --exclude 'reports' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }}" ./ ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:/home/${{ vars.SSH_USER }}/app/

          ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT }} ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} << 'EOF'
            cd /home/application/app/
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate
            python manage.py collectstatic --noinput

            mkdir -p /home/application/app/media/animais/fotos

            supervisorctl reread || true
            supervisorctl update || true
            supervisorctl restart all || true
          EOF